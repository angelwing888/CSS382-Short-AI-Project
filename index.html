<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvel Rivals Balance Patch Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2a2a3e 100%);
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }

        h1 {
            font-size: 2.5em;
            color: #ff6b6b;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(255, 107, 107, 0.3);
        }

        .subtitle {
            color: #95a5a6;
            font-size: 1.1em;
        }

        .stats {
            background: #2a2a3e;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #4ecdc4;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2.5em;
            color: #ff6b6b;
            font-weight: bold;
        }

        .stat-label {
            color: #95a5a6;
            margin-top: 5px;
            font-size: 0.95em;
        }

        .controls {
            margin: 30px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            padding: 12px 15px;
            background: #2d2d44;
            border: 1px solid #ff0000;
            color: #e0e0e0;
            border-radius: 4px;
            font-size: 1em;
        }

        .search-box::placeholder {
            color: #707080;
        }

        .search-box:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }

        .heroes-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .hero-card {
            background: #2a2a3e;
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .hero-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .hero-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .hero-name {
            font-size: 1.4em;
            color: #4ecdc4;
            font-weight: bold;
        }

        .patch-count {
            background: #ff6b6b;
            color: #1e1e2e;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .patches-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 12px;
        }

        .patch-info {
            background: #1e1e2e;
            border-left: 4px solid #4ecdc4;
            padding: 12px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .patch-name {
            color: #ff6b6b;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .patch-date {
            font-size: 0.85em;
            color: #707080;
            margin-bottom: 8px;
        }

        .adjustment-item {
            background: rgba(0, 255, 136, 0.05);
            border-left: 3px solid #00ff88;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .adjustment-text {
            color: #c0c0c0;
            line-height: 1.4;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #707080;
            font-size: 1.1em;
        }

        .filter-info {
            text-align: center;
            color: #95a5a6;
            margin-bottom: 20px;
            font-size: 0.95em;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .heroes-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            .search-box {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Marvel Rivals Balance Patch Tracker</h1>
            <p class="subtitle">Comprehensive hero adjustments from all balance patches</p>
        </header>

        <div class="stats">
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-number" id="totalHeroes">0</div>
                    <div class="stat-label">Heroes Tracked</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="totalPatches">0</div>
                    <div class="stat-label">Total Adjustments</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="latestPatch">-</div>
                    <div class="stat-label">Latest Patch</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <input 
                type="text" 
                class="search-box" 
                id="search-input" 
                placeholder="Search heroes... (e.g., Spider-Man, Iron Man, Deadpool)"
            >
        </div>

        <div id="filterInfo" class="filter-info"></div>
        <div class="heroes-grid" id="heroes-container">
            <div class="no-results">Loading balance data...</div>
        </div>
    </div>

    <script>
        const container = document.getElementById('heroes-container');
        const searchInput = document.getElementById('search-input');
        const filterInfo = document.getElementById('filterInfo');
        const totalHeroesEl = document.getElementById('totalHeroes');
        const totalPatchesEl = document.getElementById('totalPatches');
        const latestPatchEl = document.getElementById('latestPatch');

        let allHeroes = [];

        // Fetch and display all heroes on page load
        async function loadHeroes() {
            try {
                const response = await fetch('CSS382-Short-AI-Project/marvel_rivals_balance/balance_data.json');
                if (!response.ok) throw new Error('Failed to fetch heroes');
                
                const data = await response.json();
                // Convert from {name: [{patch, date, adjustment}]} to array format
                allHeroes = Object.entries(data).map(([name, adjustments]) => ({
                    name: name,
                    adjustments: adjustments,
                    adjustment_count: adjustments.length
                }));
                
                // Sort by adjustment count (most adjusted first)
                allHeroes.sort((a, b) => b.adjustment_count - a.adjustment_count);
                
                renderHeroes(allHeroes);
                loadStats();
            } catch (error) {
                console.error('Error loading heroes:', error);
                container.innerHTML = '<div class="no-results">Error loading balance data. Make sure the JSON file exists.</div>';
            }
        }

        function renderHeroes(heroes) {
            container.innerHTML = '';
            
            if (heroes.length === 0) {
                container.innerHTML = '<div class="no-results">No heroes found</div>';
                filterInfo.textContent = '';
                return;
            }

            filterInfo.textContent = `Showing ${heroes.length} hero${heroes.length !== 1 ? 'es' : ''}`;

            heroes.forEach(hero => {
                const card = document.createElement('div');
                card.className = 'hero-card';

                const patchesHTML = hero.adjustments.map(adj => `
                    <div class="patch-info">
                        <div class="patch-name">${escapeHtml(adj.patch)}</div>
                        <div class="patch-date">${formatDate(adj.date)}</div>
                        <div class="adjustment-text">${escapeHtml(adj.adjustment)}</div>
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="hero-header">
                        <div class="hero-name">${escapeHtml(hero.name)}</div>
                        <div class="patch-count">${hero.adjustment_count} patch${hero.adjustment_count !== 1 ? 'es' : ''}</div>
                    </div>
                    <div class="patches-container">
                        ${patchesHTML}
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function loadStats() {
            const totalHeroes = allHeroes.length;
            let totalAdjustments = 0;
            let latestDate = null;

            allHeroes.forEach(hero => {
                totalAdjustments += hero.adjustment_count;
                hero.adjustments.forEach(adj => {
                    if (!latestDate || new Date(adj.date) > new Date(latestDate)) {
                        latestDate = adj.date;
                    }
                });
            });

            totalHeroesEl.textContent = totalHeroes;
            totalPatchesEl.textContent = totalAdjustments;
            latestPatchEl.textContent = latestDate ? latestDate : '-';
        }

        // Search functionality
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = allHeroes.filter(hero => 
                hero.name.toLowerCase().includes(searchTerm)
            );
            renderHeroes(filtered);
        });

        function formatDate(dateString) {
            if (!dateString) return 'Unknown date';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric' 
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load heroes on page load
        loadHeroes();
    </script>
</body>
</html>
