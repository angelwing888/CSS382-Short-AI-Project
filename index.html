<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvel Rivals Balance Adjustments</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid #ff0000;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            color: #ff0000;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }

        .subtitle {
            font-size: 1.1em;
            color: #a0a0a0;
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff0000;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #ff0000;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            color: #a0a0a0;
        }

        .controls {
            margin: 30px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            padding: 12px 15px;
            background: #2d2d44;
            border: 1px solid #ff0000;
            color: #e0e0e0;
            border-radius: 4px;
            font-size: 1em;
        }

        .search-box::placeholder {
            color: #707080;
        }

        .search-box:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }

        .heroes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .hero-card {
            background: #2d2d44;
            border: 1px solid #404050;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .hero-card:hover {
            border-color: #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
            transform: translateY(-5px);
        }

        .hero-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #ff0000;
            margin-bottom: 10px;
        }

        .adjustment-count {
            font-size: 2em;
            font-weight: bold;
            color: #00ff88;
            margin-bottom: 10px;
        }

        .adjustment-label {
            font-size: 0.9em;
            color: #a0a0a0;
        }

        .hero-detail {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #404050;
        }

        .hero-detail.active {
            display: block;
        }

        .adjustment-item {
            background: rgba(0, 255, 136, 0.05);
            border-left: 3px solid #00ff88;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .adjustment-patch {
            font-weight: bold;
            color: #00ff88;
            margin-bottom: 5px;
        }

        .adjustment-date {
            font-size: 0.85em;
            color: #707080;
            margin-bottom: 8px;
        }

        .adjustment-text {
            color: #c0c0c0;
            line-height: 1.4;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #707080;
            font-size: 1.1em;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #707080;
        }

        .loading::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .heroes-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            .search-box {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🦸 Marvel Rivals Balance Adjustments</h1>
            <p class="subtitle">Track hero adjustments across all patches</p>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="total-heroes">0</div>
                    <div class="stat-label">Total Heroes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-adjustments">0</div>
                    <div class="stat-label">Total Adjustments</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="most-adjusted">-</div>
                    <div class="stat-label">Most Adjusted</div>
                </div>
            </div>
        </header>

        <div class="controls">
            <input 
                type="text" 
                class="search-box" 
                id="search-input" 
                placeholder="Search heroes... (e.g., Spider-Man, Iron Man)"
            >
        </div>

        <div class="heroes-grid" id="heroes-container">
            <div class="loading">Loading balance data</div>
        </div>
    </div>

    <script>
        let allHeroes = [];

        // Fetch and display all heroes on page load
        async function loadHeroes() {
            try {
                const response = await fetch('/api/heroes');
                if (!response.ok) throw new Error('Failed to fetch heroes');
                
                allHeroes = await response.json();
                renderHeroes(allHeroes);
                loadStats();
            } catch (error) {
                console.error('Error loading heroes:', error);
                document.getElementById('heroes-container').innerHTML = 
                    '<div class="no-results">Error loading balance data. Make sure to run the scraper first.</div>';
            }
        }

        function renderHeroes(heroes) {
            const container = document.getElementById('heroes-container');
            
            if (heroes.length === 0) {
                container.innerHTML = '<div class="no-results">No heroes found</div>';
                return;
            }

            container.innerHTML = heroes.map(hero => `
                <div class="hero-card" onclick="toggleHeroDetail('${hero.name}')">
                    <div class="hero-name">${escapeHtml(hero.name)}</div>
                    <div class="adjustment-count">${hero.adjustment_count}</div>
                    <div class="adjustment-label">patches</div>
                    <div class="hero-detail" id="detail-${hero.name}">
                        <div class="loading">Loading adjustments</div>
                    </div>
                </div>
            `).join('');
        }

        async function toggleHeroDetail(heroName) {
            const detailEl = document.getElementById(`detail-${heroName}`);
            
            if (detailEl.classList.contains('active')) {
                detailEl.classList.remove('active');
                return;
            }

            // Load adjustments if not already loaded
            if (detailEl.innerHTML.includes('Loading')) {
                try {
                    const response = await fetch(`/api/hero/${encodeURIComponent(heroName)}`);
                    if (!response.ok) throw new Error('Failed to fetch adjustments');
                    
                    const data = await response.json();
                    detailEl.innerHTML = data.adjustments.map(adj => `
                        <div class="adjustment-item">
                            <div class="adjustment-patch">${escapeHtml(adj.patch)}</div>
                            <div class="adjustment-date">${formatDate(adj.date)}</div>
                            <div class="adjustment-text">${escapeHtml(adj.adjustment)}</div>
                        </div>
                    `).join('');
                } catch (error) {
                    console.error('Error loading adjustments:', error);
                    detailEl.innerHTML = '<div class="no-results">Error loading adjustments</div>';
                }
            }

            detailEl.classList.add('active');
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                if (!response.ok) throw new Error('Failed to fetch stats');
                
                const stats = await response.json();
                document.getElementById('total-heroes').textContent = stats.total_heroes;
                document.getElementById('total-adjustments').textContent = stats.total_adjustments;
                document.getElementById('most-adjusted').textContent = stats.most_adjusted || '-';
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Search functionality
        document.getElementById('search-input').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = allHeroes.filter(hero => 
                hero.name.toLowerCase().includes(searchTerm)
            );
            renderHeroes(filtered);
        });

        function formatDate(dateString) {
            if (!dateString) return 'Unknown date';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric' 
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load heroes on page load
        loadHeroes();
    </script>
</body>
</html>
