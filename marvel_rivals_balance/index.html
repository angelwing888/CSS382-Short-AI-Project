<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvel Rivals Balance Adjustments</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid #ff0000;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            color: #ff0000;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }

        .subtitle {
            font-size: 1.1em;
            color: #a0a0a0;
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff0000;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #ff0000;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            color: #a0a0a0;
        }

        .controls {
            margin: 30px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            padding: 12px 15px;
            background: #2d2d44;
            border: 1px solid #ff0000;
            color: #e0e0e0;
            border-radius: 4px;
            font-size: 1em;
        }

        .search-box::placeholder {
            color: #707080;
        }

        .search-box:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }

        .heroes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .hero-card {
            background: #2d2d44;
            border: 1px solid #404050;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .hero-card:hover {
            border-color: #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
            transform: translateY(-5px);
        }

        .hero-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #ff0000;
            margin-bottom: 10px;
        }

        .adjustment-count {
            font-size: 2em;
            font-weight: bold;
            color: #00ff88;
            margin-bottom: 10px;
        }

        .adjustment-label {
            font-size: 0.9em;
            color: #a0a0a0;
        }

        .hero-detail {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #404050;
        }

        .hero-detail.active {
            display: block;
        }

        .adjustment-item {
            background: rgba(0, 255, 136, 0.05);
            border-left: 3px solid #00ff88;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .adjustment-patch {
            font-weight: bold;
            color: #00ff88;
            margin-bottom: 5px;
        }

        .adjustment-date {
            font-size: 0.85em;
            color: #707080;
            margin-bottom: 8px;
        }

        .adjustment-text {
            color: #c0c0c0;
            line-height: 1.4;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #707080;
            font-size: 1.1em;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .heroes-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            .search-box {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🦸 Marvel Rivals Balance Adjustments</h1>
            <p class="subtitle">Track hero adjustments across all patches</p>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="total-heroes">0</div>
                    <div class="stat-label">Total Heroes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-adjustments">0</div>
                    <div class="stat-label">Total Adjustments</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="most-adjusted">-</div>
                    <div class="stat-label">Most Adjusted</div>
                </div>
            </div>
        </header>

        <div class="controls">
            <input 
                type="text" 
                class="search-box" 
                id="search-input" 
                placeholder="Search heroes... (e.g., Spider-Man, Iron Man)"
            >
        </div>

        <div class="heroes-grid" id="heroes-container">
            <div class="no-results">Loading heroes...</div>
        </div>
    </div>

    <script>
        // Embedded balance data - completely static
        const balanceData = {
  "Spider-Man": [
    {
      "patch": "Marvel Rivals Version 20260326",
      "date": "2026-03-26",
      "adjustment": "Web swing speed increased by 10%. Improved responsiveness for wall-crawling mechanics."
    },
    {
      "patch": "Marvel Rivals Version 20260320",
      "date": "2026-03-20",
      "adjustment": "Friendly neighborhood ability cooldown reduced from 12s to 10s."
    },
    {
      "patch": "Marvel Rivals Version 20260219",
      "date": "2026-02-19",
      "adjustment": "Ultimate ability charge rate increased by 8%."
    }
  ],
  "Iron Man": [
    {
      "patch": "Marvel Rivals Version 20260326",
      "date": "2026-03-26",
      "adjustment": "Repulsor beam damage increased by 12%. Flight duration extended by 2 seconds."
    },
    {
      "patch": "Marvel Rivals Version 20260213",
      "date": "2026-02-13",
      "adjustment": "Energy management system overhauled. Missiles now consume 15% less energy."
    }
  ],
  "Captain America": [
    {
      "patch": "Marvel Rivals Version 20260320",
      "date": "2026-03-20",
      "adjustment": "Combat mechanic adjustments. Shield throw now returns faster (0.8s vs 1s). Normal attack chain optimized."
    },
    {
      "patch": "Marvel Rivals Version 20260219",
      "date": "2026-02-19",
      "adjustment": "Sentinel Strike combo consistency improved. Stun duration increased by 0.3s."
    }
  ],
  "Thor": [
    {
      "patch": "Marvel Rivals Version 20260326",
      "date": "2026-03-26",
      "adjustment": "Lightning strike area of effect expanded by 15%. Hammer throw velocity increased."
    },
    {
      "patch": "Marvel Rivals Version 20260116",
      "date": "2026-01-16",
      "adjustment": "Mjolnir charge time reduced by 1 second. Thunder ability cooldown adjusted."
    }
  ],
  "Black Widow": [
    {
      "patch": "Marvel Rivals Version 20260326",
      "date": "2026-03-26",
      "adjustment": "Grappling hook range extended by 20%. Improved mobility for escape sequences."
    },
    {
      "patch": "Marvel Rivals Version 20260215",
      "date": "2026-02-15",
      "adjustment": "Precision strike critical hit chance increased from 20% to 25%."
    }
  ],
  "Hulk": [
    {
      "patch": "Marvel Rivals Version 20260326",
      "date": "2026-03-26",
      "adjustment": "Health regeneration passive now active in combat. Damage reduction increased to 15%."
    },
    {
      "patch": "Marvel Rivals Version 20260320",
      "date": "2026-03-20",
      "adjustment": "Ground slam radius increased. Knockback effect enhanced for crowd control."
    }
  ],
  "Black Panther": [
    {
      "patch": "Marvel Rivals Version 20260326",
      "date": "2026-03-26",
      "adjustment": "Vibranium absorption rate increased by 8%. Claw attack combo speed improved."
    },
    {
      "patch": "Marvel Rivals Version 20260219",
      "date": "2026-02-19",
      "adjustment": "Kinetic energy redirection cooldown reduced. Ultimate ability duration extended."
    }
  ],
  "Doctor Strange": [
    {
      "patch": "Marvel Rivals Version 20260326",
      "date": "2026-03-26",
      "adjustment": "Portal traversal speed increased by 25%. Spell casting time reduced for all spells."
    },
    {
      "patch": "Marvel Rivals Version 20260213",
      "date": "2026-02-13",
      "adjustment": "Time manipulation ability reworked. Damage scaling adjusted for balance."
    }
  ],
  "Scarlet Witch": [
    {
      "patch": "Marvel Rivals Version 20260326",
      "date": "2026-03-26",
      "adjustment": "Chaos magic projectile speed increased. Probability field now covers larger area."
    },
    {
      "patch": "Marvel Rivals Version 20260116",
      "date": "2026-01-16",
      "adjustment": "Hex ability duration extended from 4s to 5s. Mana cost reduced by 10%."
    }
  ],
  "Vision": [
    {
      "patch": "Marvel Rivals Version 20260326",
      "date": "2026-03-26",
      "adjustment": "Density alteration phase duration increased. Phasing now allows passing through obstacles."
    },
    {
      "patch": "Marvel Rivals Version 20260215",
      "date": "2026-02-15",
      "adjustment": "Mind gem power output increased by 12%. Attack combo damage scaling improved."
    }
  ],
  "Ant-Man": [
    {
      "patch": "Marvel Rivals Version 20260326",
      "date": "2026-03-26",
      "adjustment": "Size manipulation cooldown reduced. Giant form damage bonus increased from 20% to 25%."
    },
    {
      "patch": "Marvel Rivals Version 20260219",
      "date": "2026-02-19",
      "adjustment": "Quantum tunneling ability rebalanced. Escape range extended significantly."
    }
  ]
};

        let allHeroes = [];

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadHeroes();
        });

        function loadHeroes() {
            // Create heroes array from embedded data
            allHeroes = Object.keys(balanceData).map(heroName => ({
                name: heroName,
                adjustment_count: balanceData[heroName].length
            }));

            // Sort by adjustment count (most adjusted first)
            allHeroes.sort((a, b) => b.adjustment_count - a.adjustment_count);

            renderHeroes(allHeroes);
            loadStats();
        }

        function renderHeroes(heroes) {
            const container = document.getElementById('heroes-container');

            if (heroes.length === 0) {
                container.innerHTML = '<div class="no-results">No heroes found</div>';
                return;
            }

            container.innerHTML = heroes.map(hero => `
                <div class="hero-card" onclick="toggleHeroDetail('${hero.name}')">
                    <div class="hero-name">${escapeHtml(hero.name)}</div>
                    <div class="adjustment-count">${hero.adjustment_count}</div>
                    <div class="adjustment-label">patches</div>
                    <div class="hero-detail" id="detail-${hero.name}">
                        ${balanceData[hero.name].map(adj => `
                            <div class="adjustment-item">
                                <div class="adjustment-patch">${escapeHtml(adj.patch)}</div>
                                <div class="adjustment-date">${formatDate(adj.date)}</div>
                                <div class="adjustment-text">${escapeHtml(adj.adjustment)}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleHeroDetail(heroName) {
            const detailEl = document.getElementById(`detail-${heroName}`);
            detailEl.classList.toggle('active');
        }

        function loadStats() {
            const totalHeroes = allHeroes.length;
            const totalAdjustments = allHeroes.reduce((sum, hero) => sum + hero.adjustment_count, 0);
            const mostAdjusted = allHeroes.length > 0 ? allHeroes[0].name : '-';

            document.getElementById('total-heroes').textContent = totalHeroes;
            document.getElementById('total-adjustments').textContent = totalAdjustments;
            document.getElementById('most-adjusted').textContent = mostAdjusted;
        }

        // Search functionality
        document.getElementById('search-input').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = allHeroes.filter(hero =>
                hero.name.toLowerCase().includes(searchTerm)
            );
            renderHeroes(filtered);
        });

        function formatDate(dateString) {
            if (!dateString) return 'Unknown date';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
